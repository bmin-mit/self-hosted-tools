services:
  postgres:
    container_name: bmmit-postgres
    image: postgres:18
    env_file: ../../env/shared/.env
    expose: ["5432"]
    volumes: 
      - ../../data/postgres:/var/lib/postgresql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

    healthcheck:
      test: [CMD, pg_isready, -d, outline, -U, user]
      interval: 10s
      timeout: 20s
      retries: 3
  redis:
    image: redis
    container_name: bmmit-redis
    expose: ["6379"]
    volumes: [./redis.conf:/redis.conf]
    command: [redis-server, /redis.conf]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 30s
      retries: 3
volumes:
  database-data:
