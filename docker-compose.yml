---
services:
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    env_file: 
      - ./env/postgres.env
      - ./env/outline.env
    expose: ['3000']
    volumes: [storage-data:/var/lib/outline/data]
    depends_on: [postgres, redis]

  redis:
    image: redis
    expose: ['6379']
    volumes: [./redis.conf:/redis.conf]
    command: [redis-server, /redis.conf]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 30s
      retries: 3

  postgres:
    image: postgres:18
    env_file: ./env/postgres.env
    expose: ['5432']
    volumes: [database-data:/var/lib/postgresql]
    healthcheck:
      test: [CMD, pg_isready, -d, outline, -U, user]
      interval: 30s
      timeout: 20s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file: ./env/cloudflare.env
    restart: always

volumes:
  https-portal-data:
  storage-data:
  database-data:
